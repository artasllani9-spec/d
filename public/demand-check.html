<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demand Check — demand.gg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Montserrat:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">

<body class="credits-page">

      <button type="button" class="nav-menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
      </button>
      <nav class="sectors" id="site-nav" hidden>
        <a href="trading.html" class="sector">Trading</a>
        <a href="demand-check.html" class="sector sector--active">Demand Check</a>
        <a href="credits.html" class="sector">Credits</a>
        <a href="info.html" class="sector">Info</a>
      </nav>
    </div>
    <div class="top-line-brand">
      <a href="index.html" class="logo">demand.gg</a>
      <a href="https://discord.gg/GJQ9PPgKQp" class="discord-link" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord server">

        </svg>
      </a>
    </div>
    <a href="#" class="login-btn">Log In</a>
  </header>

  <main class="demand-check-content">
    <div class="demand-check-body">
      <div class="demand-check-toolbar">
        <div class="demand-check-items-wrap">
          <button
            type="button"
            class="demand-check-other-btn"
            id="demand-check-items-btn"
            aria-label="Items"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="demand-check-category-menu"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 9h12l-6 7z" fill="currentColor"/>
            </svg>
          </button>
          <nav class="demand-check-category-menu" id="demand-check-category-menu" hidden aria-label="Item categories">
            <button type="button" class="demand-check-category demand-check-category--active" data-category="pets">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="8" r="2.2"/><circle cx="12" cy="6" r="2.2"/><circle cx="17" cy="8" r="2.2"/><path d="M5 13c1.2-2.2 3-3.2 7-3.2s5.8 1 7 3.2c.6 1.1.4 2.5-.8 3.1-2.4 1.2-8.4 1.2-10.8 0-1.2-.6-1.4-2-.4-3.1z"/></svg>
              </span>
              <span class="demand-check-category__label">Pets</span>
            </button>
            <button type="button" class="demand-check-category" data-category="pet-wear">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.5 17.5h12c.8 0 1.5.7 1.5 1.5H5c0-.8.7-1.5 1.5-1.5z"/><path d="M8.5 17.5h8l1.2-7.2c.1-.9-.6-1.8-1.7-1.8h-6.8c-1.1 0-1.8.9-1.7 1.8l1.2 7.2z"/></svg>
              </span>
              <span class="demand-check-category__label">Pet Wear</span>
            </button>
            <button type="button" class="demand-check-category" data-category="strollers">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 8.5a4 4 0 0 0 0 7"/><path d="M11 15.5h7"/><path d="M18 15.5l3.5-6"/><path d="M21.5 9.5a1 1 0 0 1-1 1.2"/><path d="M8.5 19.5 11 15.5"/><path d="M14.5 19.5 18 15.5"/><path d="M8.5 19.5 18 15.5"/><path d="M14.5 19.5 11 15.5"/><circle cx="8.5" cy="19.5" r="1.25"/><circle cx="14.5" cy="19.5" r="1.25"/></svg>
              </span>
              <span class="demand-check-category__label">Strollers</span>
            </button>
            <button type="button" class="demand-check-category" data-category="food">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 10.8c0-2.3 3.1-4 7-4s7 1.7 7 4c0 .3 0 .6-.1.9H5.1c-.1-.3-.1-.6-.1-.9z"/><rect x="5" y="11.8" width="14" height="2.1" rx=".6"/><rect x="5.5" y="14.2" width="13" height="1.7" rx=".4"/><path d="M5 16.3h14v1.4c0 1.6-3.1 2.8-7 2.8S5 19.3 5 17.7v-1.4z"/></svg>
              </span>
              <span class="demand-check-category__label">Food</span>
            </button>
            <button type="button" class="demand-check-category" data-category="vehicles">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 11l2-5h10l2 5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="4" y="11" width="16" height="6" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="8" cy="17.5" r="1.8" fill="currentColor"/><circle cx="16" cy="17.5" r="1.8" fill="currentColor"/></svg>
              </span>
              <span class="demand-check-category__label">Vehicles</span>
            </button>
            <button type="button" class="demand-check-category" data-category="toys">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><ellipse cx="12" cy="8.5" rx="5.2" ry="5.8"/><path d="M11.2 14.2c0 .5.4 1 .8 1s.8-.5.8-1"/><path d="M12.5 15.3c.5 1 .4 2.1 0 3.1-.4 1-.6 1.8-.6 2.7 0 .5.2.9.6.9s.6-.4.6-.9c0-.9-.2-1.7-.6-2.7-.4-1-.5-2.1 0-3.1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              </span>
              <span class="demand-check-category__label">Toys</span>
            </button>
            <button type="button" class="demand-check-category" data-category="gifts">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.2 8.5c-.8-1.2-.4-2.7.9-3.3 1-.5 2 .2 2.4 1.2l.5 1.4h2l.5-1.4c.4-1 1.4-1.7 2.4-1.2 1.3.6 1.7 2.1.9 3.3l-.6 1H8.8l-.6-1z"/><rect x="5" y="9.5" width="14" height="3.2" rx="1"/><path d="M7.2 12.7v6.3c0 1 1.6 1.8 4.8 1.8s4.8-.8 4.8-1.8v-6.3H7.2z"/><rect x="11.1" y="9.5" width="1.8" height="11.3" rx=".2"/></svg>
              </span>
              <span class="demand-check-category__label">Gifts</span>
            </button>
            <button type="button" class="demand-check-category" data-category="stickers">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="7.5" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3.8" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M9.2 15.8c1.2 1.4 2.4 2.6 4.1 3.8l-3.6.3-2.1-2.1c.5-.6.9-1.2 1.6-2z"/></svg>
              </span>
              <span class="demand-check-category__label">Stickers</span>
            </button>
            <button type="button" class="demand-check-category" data-category="houses">
              <span class="demand-check-category__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6 8 6v8a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
              </span>
              <span class="demand-check-category__label">Houses</span>
            </button>
          </nav>
        </div>
        <div class="pet-search-wrap demand-check-search">
          <span class="pet-search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2.2"/>
              <path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            type="search"
            class="pet-search"
            id="demand-check-search"
            placeholder="Type pet name to search..."
            aria-label="Type pet name to search"
          >
        </div>
        <a href="trade-calculator.html" class="demand-check-calc-btn" aria-label="Calculator">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="2.2"/>
            <path d="M8 7h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="9" cy="11.5" r="0.9" fill="currentColor"/>
            <circle cx="12" cy="11.5" r="0.9" fill="currentColor"/>
            <circle cx="15" cy="11.5" r="0.9" fill="currentColor"/>
            <circle cx="9" cy="15" r="0.9" fill="currentColor"/>
            <circle cx="12" cy="15" r="0.9" fill="currentColor"/>
            <path d="M14.5 14.1h3v1.8h-3z" fill="currentColor"/>
          </svg>
        </a>
      </div>
      <p class="demand-check-hint" id="demand-check-hint" hidden>No pets found</p>
      <div class="demand-check-grid-scroll">
        <div class="demand-check-grid" id="demand-check-grid" aria-label="Pet cards"></div>
      </div>
    </div>
  </main>
  <script src="nav.js"></script>
  <script src="pets-data.js"></script>
  <script src="demand-check.js"></script>
</body>
</html>
