<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading — demand.gg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Montserrat:wght@700;800&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="responsive.css">
</head>
<body class="credits-page">
  <div class="credits-background" aria-hidden="true"></div>
  <div class="credits-overlay" aria-hidden="true"></div>

  <header class="top-line">
    <div class="top-line-nav">
      <button type="button" class="nav-menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
        <span class="nav-menu-btn__line" aria-hidden="true"></span>
      </button>
      <nav class="sectors" id="site-nav" hidden>
        <a href="trading.html" class="sector sector--active">Trading</a>
        <a href="demand-check.html" class="sector">Demand Check</a>
        <a href="credits.html" class="sector">Credits</a>
        <a href="info.html" class="sector">Info</a>
      </nav>
    </div>
    <div class="top-line-brand">
      <a href="index.html" class="logo">demand.gg</a>
      <a href="https://discord.gg/GJQ9PPgKQp" class="discord-link" target="_blank" rel="noopener noreferrer" aria-label="Join our Discord server">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
      </a>
    </div>
    <a href="#" class="login-btn">Log In</a>
  </header>

  <main class="trading-content">
    <div class="trading-page">
      <div class="trading-toolbar">
        <a href="post-trade.html" class="trading-btn trading-btn--with-icon">
          <span class="trading-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="trading-btn__label">Post Trade</span>
        </a>
        <button type="button" class="trading-btn trading-btn--with-icon" id="accepted-trades-btn" aria-pressed="false">
          <span class="trading-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="trading-btn__label">Accepted Trades</span>
        </button>
        <button type="button" class="trading-btn trading-btn--icon-only" aria-label="Messages">
          <span class="trading-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 6.5h16v9H7.5L4 18.5V6.5z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
              <path d="M4 6.5l8 5.5 8-5.5" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </div>
      <div class="trading-glass-bar">
        <div class="trading-feed-scroll">
          <div class="trading-feed-headbar" id="trading-feed-headbar" hidden>
            <span class="trading-feed-headbar__label">Offerer</span>
            <span class="trading-feed-headbar__label">Your Side</span>
            <span class="trading-feed-headbar__label">Their Side</span>
            <span class="trading-feed-headbar__spacer" aria-hidden="true"></span>
          </div>
          <div class="posted-trades-feed" id="posted-trades-feed"></div>
          <p class="posted-trades-empty" id="posted-trades-empty" hidden>No trades posted yet.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script src="trades.js"></script>
  <script src="trading-feed.js"></script>
</body>
</html>
